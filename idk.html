<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagler Launcher</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Red Spark Background Animation */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #400 0%, #000 70%);
            z-index: -1;
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff4d4d;
            border-radius: 50%;
            animation: fly linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            text-align: center;
            background: rgba(20, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 10px #ff0000; }

        button {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 10px auto;
            background: #800;
            color: white;
            border: 2px solid #f00;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #f00; box-shadow: 0 0 15px #f00; }

        /* Watermark styling */
        #wm-container {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="bg" id="spark-bg"></div>

    <div class="container">
        <h1>EAGLERCRAFT</h1>
        <button onclick="launch('1.8.8')">Launch 1.8.8</button>
        <button onclick="launch('1.12.2')">Launch 1.12.2</button>
    </div>

    <div id="wm-container"></div>

    <script>
        // 1. Generate background sparks
        const bg = document.getElementById('spark-bg');
        for (let i = 0; i < 50; i++) {
            let s = document.createElement('div');
            s.className = 'spark';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (Math.random() * 3 + 2) + 's';
            s.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(s);
        }

        // 2. Persistent Watermark logic
        const encodedWM = "bWFkZSBieSB6YWthMTM="; // "made by zaka13"
        function createWM() {
            const container = document.getElementById('wm-container');
            container.innerHTML = '';
            const wm = document.createElement('span');
            wm.id = 'protected-wm';
            wm.style.opacity = '0.6';
            wm.style.fontSize = '12px';
            wm.innerText = atob(encodedWM);
            container.appendChild(wm);
        }

        // Monitor and recreate if deleted or tampered with
        const observer = new MutationObserver(() => {
            if (!document.getElementById('protected-wm')) createWM();
        });
        observer.observe(document.body, { childList: true, subtree: true });
        createWM();

        // 3. About:Blank Launcher (Base64 Cloak)
        function launch(version) {
            const win = window.open('about:blank', '_blank');
            const gameBase64 = "BASE64 HERE"; // Replace with actual client Base64
            
            const html = `
                <html>
                <body style="margin:0;padding:0;background:#000;overflow:hidden">
                    <iframe src="data:text/html;base64,${gameBase64}" 
                            style="width:100vw;height:100vh;border:none;">
                    </iframe>
                </body>
                </html>
            `;
            win.document.write(html);
        }
    </script>
</body>
</html>
