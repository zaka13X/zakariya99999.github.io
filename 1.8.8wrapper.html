<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zaka13s g*mes</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #161616;
            --accent-color: #3b82f6; /* Modern Blue */
            --border-color: #262626;
            --text-main: #ededed;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 1rem 1.5rem;
            background: #1c1c1c;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #888;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981; /* Green */
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        iframe {
            flex: 1;
            border: none;
            background: white; /* Content usually expects light bg */
            border-radius: 0 0 12px 12px;
        }

        /* Tooltip style loader */
        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h2><span class="status-dot"></span> </h2>
            <div style="font-size: 12px; color: #555;">iframe:srcdoc</div>
        </div>
        
        <!-- The Frame -->
        <iframe id="blobFrame" sandbox="allow-scripts allow-same-origin" title="Blob Content"></iframe>
    </div>

    <script>
        // Replace with your actual Vercel Blob URL
        const BLOB_URL = https://ihpsx95z8xw4vafo.public.blob.vercel-storage.com/ob-8qNOKHQj0heIDPTPxJdd7af8Ti1gBV';

        async function loadBlobToSrcDoc() {
            try {
                const response = await fetch(BLOB_URL);
                const htmlContent = await response.text();
                
                // Injecting the content into srcdoc
                const frame = document.getElementById('blobFrame');
                frame.srcdoc = htmlContent;
                
            } catch (error) {
                console.error('Error fetching blob:', error);
                document.getElementById('blobFrame').srcdoc = "<h1>Failed to load content</h1>";
            }
        }

        loadBlobToSrcDoc();
    </script>
</body>
</html>
