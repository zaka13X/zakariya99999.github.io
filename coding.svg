<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- The foreignObject acts as the container for non-SVG content -->
  <foreignObject width="100%" height="100%">
    <!-- Explicitly declare the XHTML namespace for the iframe -->
    <div xmlns="http://w3.org" style="height: 100%; width: 100%;">
      <iframe src="index.html" style="border: none; width: 100%; height: 100%;"></iframe>
    </div>
  </foreignObject>
</svg>
