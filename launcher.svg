<svg xmlns="http://w3.org" width="100%" height="100%">
  <defs>
    <style>
      .full-viewport {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #ffffff;
      }
      
      .content-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </defs>
  
  <foreignObject width="100%" height="100%">
    <html xmlns="http://w3.org" class="full-viewport">
      <body class="full-viewport">
        <iframe src="21.html" class="content-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
      </body>
    </html>
  </foreignObject>
</svg>
