<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaka's random ahh site</title>
    <style>
        :root {
            --bg-color: #008080; /* Your original teal */
            --nav-bg: rgba(0, 0, 0, 0.3);
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background: var(--nav-bg);
            padding: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 25px;
            backdrop-filter: blur(5px);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 { font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.85; max-width: 600px; }
    </style>
</head>
<body>

    <nav>
        <a href="info.html">Info</a>
        <a href="21.html">Launcher</a>
        <a href="more.html">More</a>
        <a href="idk.html">Cool Stuff</a>
    </nav>

    <main>
        <h1>Welcome to zaka's site</h1>
        <p>A simple, fast site for random stuff</p>
    </main>

</body>
</html>
