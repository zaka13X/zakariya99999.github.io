<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.com, Currently studing Math at Study.com!</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }
        .online { background: #2ecc71; color: #fff; }
        .offline { background: #e74c3c; color: #fff; }
        .motd { background: #000; padding: 10px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; font-size: 14px; margin: 10px 0; min-height: 40px; text-align: left; overflow: hidden; }
        .stats { font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="server-ip">34.31.86.240</h2>
    <div id="status" class="status-badge">Checking...</div>
    
    <div class="motd" id="motd">Loading MOTD...</div>
    
    <div class="stats">
        Players: <span id="player-count">0</span> / <span id="player-max">0</span>
    </div>
</div>

<script>
    async function updateStatus() {
        const statusBadge = document.getElementById('status');
        const motdElement = document.getElementById('motd');
        const playerCount = document.getElementById('player-count');
        const playerMax = document.getElementById('player-max');

        try {
            const response = await fetch('https://api.mcstatus.io/v2/status/java/34.31.86.240');
            const data = await response.json();

            if (data.online) {
                statusBadge.textContent = "ONLINE";
                statusBadge.className = "status-badge online";
                
                // Use the HTML provided by mcstatus.io for colors/formatting
                motdElement.innerHTML = data.motd.html;
                
                playerCount.textContent = data.players.online;
                playerMax.textContent = data.players.max;
            } else {
                statusBadge.textContent = "OFFLINE";
                statusBadge.className = "status-badge offline";
                motdElement.textContent = "Server is currently unreachable.";
            }
        } catch (error) {
            statusBadge.textContent = "ERROR";
            statusBadge.className = "status-badge offline";
            motdElement.textContent = "Could not fetch server data.";
        }
    }

    // Run on load
    updateStatus();
    // Refresh every 60 seconds
    setInterval(updateStatus, 60000);
</script>

</body>
</html>
