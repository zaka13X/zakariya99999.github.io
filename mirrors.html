<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zaka13s mirrors</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        .navbar {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .navbar .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .navbar .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            padding-bottom: 5px;
            transition: color 0.3s ease;
        }

        .navbar .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.3s ease;
        }

        .navbar .nav-links a:hover {
            color: var(--accent-color);
        }

        .navbar .nav-links a:hover::after {
            width: 100%;
        }

        /* Main Content Area */
        .main-content {
            margin-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .main-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content p {
            color: #888;
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .cta-btn {
            padding: 15px 40px;
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }

        .cta-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--accent-glow);
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">ZAKAS MIRRORS</div>
        <ul class="nav-links">

        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <h1>MIRRORS</h1>

        <ul class="nav-links">
            <li><a href="https://zaka.ignorelist.com/21.html">MIRROR 4(1.12.2)</a></li>
            <li><a href="https://cdn.statically.io/gh/zaka13X/zakariya99999.github.io@main/loader_1.8.8_fixed.svg">MIRROR 5(1.8.8)</a></li>
            <li><a href="https://cdn.statically.io/gh/zaka13X/zakariya99999.github.io@main/modern_client.svg">Mirror 6(ModernClient)</a></li
            <li><a href="https://zaka.ignorelist.com/21.html">MIRROR 7(1.12.2)</a></li>
            <li><a href="https://cdn.statically.io/gh/zaka13X/zakariya99999.github.io@main/loader_1.8.8_fixed.svg">MIRROR 8(1.8.8)</a></li>

</body>
</html>
